<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>總管家包租代管 | AI 多筆公設識別計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #16a085;
            --bg: #f8f9fa;
        }
        body { background-color: var(--bg); color: var(--primary); }
        .fraction-row { display: grid; grid-template-columns: 2fr 1fr 20px 1fr 40px; gap: 8px; align-items: flex-end; }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px; height: 36px;
            border-radius: 50%;
            border-left-color: var(--accent);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
    <header class="text-center mb-8">
        <h1 class="text-2xl font-bold border-b-2 border-[#16a085] pb-2 inline-block">總管家包租代管專業計算器</h1>
        <p class="text-gray-500 text-sm mt-2">由 宜仁居家有限公司 AI 技術支援 (多筆公設版)</p>
    </header>

    <!-- AI 掃描區塊 -->
    <section class="mb-8 p-4 bg-emerald-50 rounded-xl border border-emerald-100">
        <h2 class="text-emerald-800 font-bold mb-3 flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            AI 影像識別 (自動填寫多筆公設)
        </h2>
        <div class="flex flex-col gap-4">
            <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-100 file:text-emerald-700 hover:file:bg-emerald-200">
            <button onclick="processImage()" class="bg-emerald-600 text-white py-2 px-6 rounded-lg font-bold hover:bg-emerald-700 transition w-full">
                開始識別謄本照片
            </button>
        </div>
    </section>

    <!-- 輸入表單 -->
    <form id="calcForm" class="space-y-6">
        <div>
            <h3 class="text-sm font-bold text-emerald-700 mb-3 uppercase tracking-wider">基礎面積 (㎡)</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">主建物 <span class="text-red-500">*</span></label>
                    <input type="number" id="mainArea" step="0.01" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">附屬建物 <span class="text-red-500">*</span></label>
                    <input type="number" id="subArea" step="0.01" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="0.00">
                </div>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold text-emerald-700 uppercase tracking-wider">共有部分 (公設/車位)</h3>
                <button type="button" onclick="addFacilityRow()" class="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded hover:bg-emerald-200">+ 新增公設筆數</button>
            </div>
            <div id="facilityContainer" class="space-y-3">
                <!-- 動態生成區域 -->
                <div class="facility-row p-3 bg-gray-50 rounded-lg border border-gray-100">
                    <div class="fraction-row">
                        <div><span class="text-[10px] text-gray-400 block">總面積(㎡)</span><input type="number" class="area w-full p-2 border rounded" placeholder="0.00"></div>
                        <div><span class="text-[10px] text-gray-400 block">分子</span><input type="number" class="num w-full p-2 border rounded" placeholder="1"></div>
                        <div class="pb-2 text-center text-gray-400">/</div>
                        <div><span class="text-[10px] text-gray-400 block">分母</span><input type="number" class="den w-full p-2 border rounded" placeholder="1"></div>
                        <div class="pb-1 text-center"><button type="button" onclick="removeRow(this)" class="text-gray-300 hover:text-red-500">×</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">月租金</label>
                <input type="number" id="rent" class="w-full p-3 border rounded-lg" placeholder="金額">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">管理費</label>
                <input type="number" id="mgmt" class="w-full p-3 border rounded-lg" placeholder="金額">
            </div>
        </div>

        <div class="flex gap-3 pt-4">
            <button type="button" onclick="location.reload()" class="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition">重置</button>
            <button type="button" onclick="calculate()" class="flex-[2] py-3 bg-[#16a085] text-white rounded-xl font-bold hover:bg-[#138d75] transition shadow-lg shadow-emerald-100">執行計算</button>
        </div>
    </form>

    <div id="result" class="mt-8 hidden animate-fade-in">
        <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200" id="resContent"></div>
        <button onclick="copyResult()" class="w-full mt-4 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition">一鍵複製報表</button>
    </div>
</div>

<div id="loading" class="loading-overlay">
    <div class="spinner mb-4"></div>
    <p class="font-bold text-emerald-800">AI 正在自動識別所有共有部分...</p>
</div>

<script>
    const apiKey = ""; 
    const M2_TO_PING = 0.3025;

    function addFacilityRow(data = {}) {
        const container = document.getElementById('facilityContainer');
        const div = document.createElement('div');
        div.className = "facility-row p-3 bg-gray-50 rounded-lg border border-gray-100";
        div.innerHTML = `
            <div class="fraction-row">
                <div><span class="text-[10px] text-gray-400 block">總面積(㎡)</span><input type="number" class="area w-full p-2 border rounded" value="${data.area || ''}" placeholder="0.00"></div>
                <div><span class="text-[10px] text-gray-400 block">分子</span><input type="number" class="num w-full p-2 border rounded" value="${data.num || 1}" placeholder="1"></div>
                <div class="pb-2 text-center text-gray-400">/</div>
                <div><span class="text-[10px] text-gray-400 block">分母</span><input type="number" class="den w-full p-2 border rounded" value="${data.den || 1}" placeholder="1"></div>
                <div class="pb-1 text-center"><button type="button" onclick="removeRow(this)" class="text-gray-300 hover:text-red-500 text-xl">×</button></div>
            </div>
        `;
        container.appendChild(div);
    }

    function removeRow(btn) {
        const rows = document.querySelectorAll('.facility-row');
        if (rows.length > 1) {
            btn.closest('.facility-row').remove();
        } else {
            alert("至少需保留一筆公設欄位");
        }
    }

    async function processImage() {
        const fileInput = document.getElementById('imageInput');
        if (fileInput.files.length === 0) return alert("請選擇照片");

        toggleLoading(true);
        const file = fileInput.files[0];
        const base64Data = await toBase64(file);

        const prompt = `你是一個專業的台灣房地產專家。請從這張建物謄本照片中提取數據。
        請僅返回 JSON 格式，包含以下鍵值：
        - mainArea (主建物面積，數字)
        - subArea (附屬建物面積，數字)
        - facilities (數組，每一項代表一筆共有部分/公設/車位，包含 area, num, den)
        注意：請識別謄本中所有的共有部分項目。`;

        try {
            const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: file.type, data: base64Data.split(',')[1] } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            const result = await response.json();
            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) autoFill(JSON.parse(text));
        } catch (error) {
            alert("識別失敗，請手動輸入。");
        } finally {
            toggleLoading(false);
        }
    }

    function autoFill(data) {
        if (data.mainArea) document.getElementById('mainArea').value = data.mainArea;
        if (data.subArea) document.getElementById('subArea').value = data.subArea;
        
        if (data.facilities && data.facilities.length > 0) {
            const container = document.getElementById('facilityContainer');
            container.innerHTML = ''; // 清空現有的
            data.facilities.forEach(f => addFacilityRow(f));
        }
        alert("AI 已自動填寫 " + (data.facilities ? data.facilities.length : 0) + " 筆公設資料！");
    }

    function calculate() {
        const getVal = id => parseFloat(document.getElementById(id).value) || 0;
        const main = getVal('mainArea');
        const sub = getVal('subArea');
        const rent = getVal('rent');
        
        if (!main) return alert("請輸入主建物面積");

        let totalPubM2 = 0;
        document.querySelectorAll('.facility-row').forEach(row => {
            const a = parseFloat(row.querySelector('.area').value) || 0;
            const n = parseFloat(row.querySelector('.num').value) || 1;
            const d = parseFloat(row.querySelector('.den').value) || 1;
            totalPubM2 += a * (n / d);
        });

        const deedM2 = main + sub + totalPubM2;
        const interiorM2 = main + sub;

        const resContent = document.getElementById('resContent');
        document.getElementById('result').style.display = 'block';

        resContent.innerHTML = `
            <div class="space-y-4">
                <div class="flex justify-between border-b pb-2">
                    <span class="text-gray-500">權狀總面積 (含所有公設)</span>
                    <div class="text-right"><span class="text-xl font-bold text-emerald-600">${(deedM2*M2_TO_PING).toFixed(2)} 坪</span><br><span class="text-xs text-gray-400">${deedM2.toFixed(2)} ㎡</span></div>
                </div>
                <div class="flex justify-between border-b pb-2 text-sm">
                    <span class="text-gray-400">其中：室內面積</span>
                    <span>${(interiorM2*M2_TO_PING).toFixed(2)} 坪</span>
                </div>
                <div class="flex justify-between border-b pb-2 text-sm">
                    <span class="text-gray-400">其中：公設總計</span>
                    <span>${(totalPubM2*M2_TO_PING).toFixed(2)} 坪</span>
                </div>
                <div class="pt-2">
                    <div class="flex justify-between font-bold text-slate-800">
                        <span>單坪月租金</span>
                        <span>${deedM2 > 0 ? Math.round(rent/(deedM2*M2_TO_PING)).toLocaleString() : 0} 元/坪</span>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    }

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = e => reject(e);
        });
    }

    async function fetchWithRetry(url, options, retries = 5) {
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, options);
                if (response.ok) return response;
            } catch (e) {}
            await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
        }
        throw new Error("Retry failed");
    }

    function toggleLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }

    function copyResult() {
        const text = document.getElementById('resContent').innerText;
        const report = `【總管家包租代管 - 專業試算報告】\n--------------------\n${text}\n--------------------\n宜仁居家 AI 顧問關心您`;
        const el = document.createElement("textarea");
        el.value = report;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("已複製報表！");
    }
</script>

</body>
</html>
